<!DOCTYPE html>
<html>

<head>
    <title>Adicionar à matriz</title>
</head>

<body>

    <h2>Definir tamanho da matriz</h2>
    <input type="number" id="inputLinhas" placeholder="Linhas" min="1">
    <input type="number" id="inputColunas" placeholder="Colunas" min="1">
    <button onclick="iniciarMatriz()">Iniciar</button>

    <h3>Inserir número</h3>
    <input type="number" id="inputNumero" placeholder="Digite um número" disabled>
    <button onclick="adicionarNumero()" id="btnAdicionar" disabled>Adicionar</button>

    <h3>Matriz armazenada:</h3>
    <pre id="saidaMatriz">[]</pre>

     <h3>Soma de todos os elementos da Matriz</h3>
     <button onclick="somatodos()">Somar</button><br>
     <label for="soma">Soma:</label>
     <span id="soma"></span>
     
     <h3>Soma dos elementos da coluna informada</h3>
     <input type="number" id="coluna" placeholder="digite uma coluna">
     <button onclick="somacoluna()">Somar</button><br>
     <label for="somacoluna">Soma Coluna:</label>
     <span id="somacoluna"></span>

     <h3>Média dos elementos da linha informada</h3>
     <input type="number" id="linha" placeholder="digite uma linha">
     <button onclick="medialinha()">calcular</button><br>
     <label for="medialinha">Média linha:</label>
     <span id="medialinha"></span>

     <h3>Números pares da matriz</h3>
     <button onclick="pares()">procurar</button><br>
     <label for="vetorpares"> Números pares:</label>
     <span id="vetorpares"></span>

     <h3>Quantidade de números primos da matriz</h3>
     <button onclick="primo()">procurar</button><br>
     <label for="primos"> Quantidade primos:</label>
     <span id="primos"></span>

      <script src="matriz.js"></script>
