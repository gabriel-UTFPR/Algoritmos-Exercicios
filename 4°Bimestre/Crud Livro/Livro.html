<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Livro</title>
</head>

<body>

<h1>Cadastro de Livro</h1>

<label for="inputcodigo">codigo</label>
<input type="number" name="inputcodigo" id="inputcodigo">
<input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
<input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
<input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
<input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
<br><br>

<label for="inputtitulo">título</label>
<input type="text" name="inputtitulo" id="inputtitulo"><br>
<label for="inputautor">autor</label>
<input type="text" name="inputautor" id="inputautor"><br>
<label for="inputanopublicacao">ano publicacao</label>
<input type="date" name="inputanopublicacao" id="inputanopublicacao"><br>
<label for="inputgenero">gênero</label>
<input type="text" name="inputgenero" id="inputgenero"><br>
<div id="divAviso" style="background-color: antiquewhite;"></div>
<br>
<input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
<input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
<br><br>
<div id="outputSaida" style="background-color: aqua;">...</div>

<input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
<input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
<h1>Procurar gênero</h1>

<input type="text" name="inputProcGen" id="inputProcGen">
<input type="button" value="prc gênero " onclick="Pgenero()">
<div id="outputSaidagenero" style="background-color: rgb(255, 166, 0);">...</div>
<h1>Procurar Autor</h1>

<input type="text" name="inputProcAutor" id="inputProcAutor">
<input type="button" value="prc Autor " onclick="Pautor()">
<div id="outputSaidaAutor" style="background-color: rgb(190, 13, 122);">...</div>
<h1>Procurar Ano de lançamento</h1>

<input type="number" name="inputProcAno" id="inputProcAno" >
<input type="button" value="prc Ano " onclick="Pano()">

<div id="outputSaidaAutor" style="background-color: rgb(20, 225, 122);">...</div>
<script src="./Livro.js"></script>
<script src="./LivroControl.js"></script>

</body>

</html>
