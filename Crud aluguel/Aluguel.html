<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Aluguel</title>
</head>

<body>

<h1>Cadastro de Aluguel</h1>

<label for="inputnumeroContrato">Número Contrato</label>
<input type="number" name="inputnumeroContrato" id="inputnumeroContrato">
<input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
<input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
<input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
<input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
<br><br>

<label for="inputnomeProprietario">Nome do Proprietario</label>
<input type="text" name="inputnomeProprietario" id="inputnomeProprietario"><br>
<label for="inputnomeInquilino">Nome do Inquilino</label>
<input type="text" name="inputnomeInquilino" id="inputnomeInquilino"><br>
<label for="inputvalorAluguel">Valor Aluguel</label>
<input type="number" name="inputvalorAluguel" id="inputvalorAluguel"><br>
<label for="inputprazoDoContratoEmMeses">Prazo do Contrato em meses</label>
<input type="number" name="inputprazoDoContratoEmMeses" id="inputprazoDoContratoEmMeses"><br>
<label for="inputestaAlugado">Esta Alugado?</label>
<input type="checkbox" name="inputestaAlugado" id="inputestaAlugado" ><br>
<label for="inputdataDeInicioDoContrato">Data de Início do Contrato</label>
<input type="date" name="inputdataDeInicioDoContrato" id="inputdataDeInicioDoContrato"><br>

<form method="get" action=".">
<label for="inputcepImovel">Cep Imóvel</label>
<input type="text" name="inputcepImovel" id="inputcepImovel" oninput="pesquisacep(this.value)"><br>
<label for="inputenderecoImovel">Endereço Imóvel</label>
<input type="text" name="inputenderecoImovel" id="inputenderecoImovel"><br>
<label for="inputbairro">Bairro</label>
<input type="text" name="inputbairro" id="inputbairro"><br>
<label for="inputcidade">Cidade</label>
<input type="text" name="inputcidade" id="inputcidade"><br>

</form>
<div id="divAviso" style="background-color: antiquewhite;"></div>
<br>
<input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
<input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
<br><br>
<div id="outputSaida" style="background-color: aqua;">...</div>

<input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
<input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
<h1> Prazo para conclusão</h1>
<div id="outputSaida2" style="background-color: rgb(241, 11, 11);">...</div>
<input type="button" value="listar" onclick="Datafinal()">

<script src="./Aluguel.js"></script>
<script src="./AluguelControl.js"></script>

</body>
</html>
