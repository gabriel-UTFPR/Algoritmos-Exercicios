<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="origem">Origem (Brasil, Eua, Canadá, Argentina):</label>
    <input type="text" id="origem"><br>
    <label for="destino">Destino (Brasil, Eua, Canadá, Argentina):</label>
    <input type="text" id="destino"><br>
    <label for="mes">Mês da viagem(1 a 12):</label>
    <input type="number" id="mes"><br>
    <button onclick="viagem()">Verificar</button>
    <label for="saida"></label>
    <span id="saida"></span>
    <script>
        function viagem(){
            let origem = document.getElementById("origem").value;
            let destino = document.getElementById("destino").value;
            let mes = parseInt(document.getElementById("mes").value);
            
            let hemisferioorigem="";
            let hemisferiodestino="";
            let estacaoorigem="";
            let estacaodestino="";
            let resp="";

            if(origem=="Brasil"||origem=="Argentina"){
                hemisferioorigem="Hemisfério Sul";
            }else if(origem=="Eua"||origem=="Canadá"){
                hemisferioorigem="Hemisfério Norte";
            }
            if(hemisferioorigem=="Hemisfério Sul"){
                if(mes<=3){
                    estacaoorigem="Verão";
                }else if(mes<=6){
                    estacaoorigem="Outono";
                }else if(mes<=9){
                    estacaoorigem="Inverno";
                }else{
                    estacaoorigem="Primavera";
                }
            }else if(hemisferioorigem=="Hemisfério Norte"){
                if(mes<=3){
                    estacaoorigem="Inverno";
                }else if(mes<=6){
                    estacaoorigem="Primavera";
                }else if(mes<=9){
                    estacaoorigem="Verão";
                }else{
                    estacaoorigem="Outono";
                }
            }
             if(destino=="Brasil"||destino=="Argentina"){
                hemisferiodestino="Hemisfério Sul";
            }else if(destino=="Eua"||destino=="Canadá"){
                hemisferiodestino="Hemisfério Norte";
            }
            if(hemisferiodestino=="Hemisfério Sul"){
                if(mes<=3){
                    estacaodestino="Verão";
                }else if(mes<=6){
                    estacaodestino="Outono";
                }else if(mes<=9){
                    estacaodestino="Inverno";
                }else{
                    estacaodestino="Primavera";
                }
            }else if(hemisferiodestino=="Hemisfério Norte"){
                if(mes<=3){
                    estacaodestino="Inverno";
                }else if(mes<=6){
                    estacaodestino="Primavera";
                }else if(mes<=9){
                    estacaodestino="Verão";
                }else{
                    estacaodestino="Outono";
                }
            }
            resp="Você está no(a) "+ origem +" que está no "+ hemisferioorigem+ " cuja estação é "+estacaoorigem+" e o destino é o(a) "+
            destino+" que está no "+ hemisferiodestino+ " e lá a estação é "+ estacaodestino+".";
            document.getElementById("saida").innerHTML=resp;
        }
    </script>
</body>
</html>
