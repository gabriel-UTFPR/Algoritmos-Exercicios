<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Professores</title>
</head>

<body>

<h1>Cadastro de Professores</h1>

<label for="inputidProf">idProf</label>
<input type="number" name="inputidProf" id="inputidProf">
<input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
<input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
<input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
<input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
<br><br>

<label for="inputnome">nome</label>
<input type="text" name="inputnome" id="inputnome"><br>
<label for="inputdisciplina">disciplina</label>
<select id="inputdisciplina">
 <option value=""> Selecione uma opção </option>
        <option value="Matemática">Matemática</option>
        <option value="Quimica">Quimica</option>
        <option value="Algoritmos">Algoritmos</option>
        <option value="História">História</option>
        <option value="Artes">Artes</option>
        <option value="Física">Física</option>
        <option value="Informática">Informática</option>
        <option value="Português">Português</option>
    </select><br>
<label for="inputtempoExperiencia">tempoExperiencia</label>
<input type="number" name="inputtempoExperiencia" id="inputtempoExperiencia"><br>
<label for="inputtitulaçao">titulaçao</label>
<select id="inputtitulaçao">
    <option value=""> Selecione uma opção </option>
        <option value="Graduado">Graduado</option>
        <option value="Especialista">Especialista</option>
        <option value="Mestre">Mestre</option>
        <option value="Doutor">Doutor</option>
    </select><br>
<label for="inputaposentado">aposentado</label>
<input type="checkbox" name="inputaposentado" id="inputaposentado"><br>
<label for="inputdataContrataçao">dataContrataçao</label>
<input type="date" name="inputdataContrataçao" id="inputdataContrataçao"><br>
<div id="divAviso" style="background-color: antiquewhite;"></div>
<br>
<input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
<input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
<br>
<h1>Listar Professores por titulação</h1>
<input type="text" name="titulaçao" id="titulaçao">
<input type="button" value="listar" onclick="ListarProfessores()"><br>
<h1>Selecionar Professores por disciplina</h1>
<input type="text" name="disciplina" id="disciplina">
<input type="button" value="Selecionar" onclick="SelecionarProfessores()">
<br>
<h1>Filtro Professores com + de 5 anos de experiência</h1>
<input type="button" value="filtrar" onclick="Filtro()"><br><br>

<div id="outputSaida" style="background-color: aqua;">...</div>

<input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
<input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
<input type="button" value="voltar Lista completa" onclick="listar()"><br>
















<script src="./Professores.js"></script>
<script src="./ProfessoresControl.js"></script>

</body>

</html>
