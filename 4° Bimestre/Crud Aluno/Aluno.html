<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Aluno</title>
</head>

<body>

<h1>Cadastro de Aluno</h1>

<label for="inputRa">Ra</label>
<input type="number" name="inputRa" id="inputRa">
<input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
<input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
<input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
<input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
<br><br>

<label for="inputNome">Nome</label>
<input type="text" name="inputNome" id="inputNome"><br>
<label for="inputDataNascimento">DataNascimento</label>
<input type="date" name="inputDataNascimento" id="inputDataNascimento"><br>
<label for="inputMatriculado">Matriculado</label>
<input type="checkbox" name="inputMatriculado" id="inputMatriculado"><br>
<label for="inputCurso">Curso</label>
 <select name="inputCurso" id="inputCurso">
  <option value="Ciencia da Computacao">Ciência da Computação</option>
  <option value="Engenharia Ambiental e Sanitaria">Engenharia Ambiental e Sanitária</option>
  <option value="Engenharia Civil">Engenharia Civil</option>
  <option value="Engenharia de Alimentos">Engenharia de Alimentos</option>
  <option value="Engenharia Eletronica">Engenharia Eletrônica</option>
  <option value="Engenharia Quimica">Engenharia Química</option>
  <option value="Licenciatura em Quimica">Licenciatura em Química</option>
  <option value="Tecnologia em Alimentos">Tecnologia em Alimentos</option>
  <option value="Tecnico Integrado em Informatica para Internet">Técnico Integrado em Informática para Internet</option>
</select><br>
<div id="divAviso" style="background-color: antiquewhite;"></div>
<br>
<input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
<input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
<br><br>
<div id="outputSaida" style="background-color: aqua;">...</div>

<input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
<input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
<script src="./Aluno.js"></script>
<script src="./AlunoControl.js"></script>

</body>

</html>
