<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Imovel</title>
</head>

<body>

<h1>Cadastro de Imovel</h1>

<label for="inputnummatricula">Número da matricula</label>
<input type="number" name="inputnummatricula" id="inputnummatricula" min="1">
<input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
<input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
<input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
<input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
<br><br>

<label for="inputendereço">Endereço</label>
<input type="text" name="inputendereço" id="inputendereço"><br>
<label for="inputbairro">Bairro</label>
<select id="inputbairro">
        <option value=""> Selecione uma opção </option>
        <option value="Jardim Paulista">Jardim Paulista</option>
        <option value="Jardim América">Jardim América</option>
        <option value="Jardim Parigot">Jardim Parigot</option>
        <option value="Jardim Aparecida">Jardim aparecida</option>
        <option value="Jardim Aeroporto">Jardim Aeroporto</option>
    </select>
<br>
<label for="inputtipo">Tipo</label>
<select id="inputtipo">
        <option value=""> Selecione uma opção </option>
        <option value="Residencial">Residencial</option>
        <option value="Comercial">Comercial</option>
        <option value="Rural">Rural</option>
    </select><br>
<label for="inputarea">Área</label>
<input type="number" name="inputarea" id="inputarea"><br>
<label for="inputcomodos">Comodos</label>
<input type="number" name="inputcomodos" id="inputcomodos"><br>
<label for="inputalugado">Alugado</label>
<input type="checkbox" name="inputalugado" id="inputalugado"><br>
<label for="inputdataconclusao">Data conclusao</label>
<input type="date" name="inputdataconclusao" id="inputdataconclusao"><br>
<div id="divAviso" style="background-color: antiquewhite;"></div>
<br>
<input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
<input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
<br><br>
<div id="outputSaida" style="background-color: aqua;">...</div>

<input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
<input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
<script src="./Imovel.js"></script>
<script src="./ImovelControl.js"></script>

</body>

</html>
